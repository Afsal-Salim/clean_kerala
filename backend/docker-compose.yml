services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mkc
      POSTGRES_PASSWORD: mkc_dev
      POSTGRES_DB: make_kerala_clean
    ports:
      - "5432:5432"
    volumes:
      - mkc_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mkc_pgdata:
